<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>McDonald's Self-Service Kiosk</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="kiosk-container">

  <div class="header">
 
  </div>


  <div class="menu">
   
    <div class="menu-item">
      <img src="https://th.bing.com/th?id=OIF.1yC5%2fGO%2fNpcbGgOHNYGoNw&w=273&h=180&c=7&r=0&o=5&dpr=1.5&pid=1.7" alt="Double Cheeseburger">
      <h4>A Burger</h4>
      <p>45 Kč</p>
    </div>
    <div class="menu-item">
      <img src="www/img/OIP (2).jpg" alt="Double Cheeseburger">
      <h4>B Burger</h4>
      <p>68 Kč</p>
    </div>
    <div class="menu-item">
      <img src="www/img/OIP (3).jpg" alt="Double Cheeseburger">
      <h4>C Burger</h4>
      <p>31 Kč</p>
    </div>
    <div class="menu-item">
      <img src="www/img/OIP (4).jpg" alt="Double Cheeseburger">
      <h4>D Burger</h4>
      <p>58 Kč</p>
    </div>
    <div class="menu-item">
      <img src="www/img/OIP (5).jpg" alt="Double Cheeseburger">
      <h4>E Burger</h4>
      <p>99 Kč</p>
    </div>
    <div class="menu-item">
      <img src="www/img/oip (6).jpg" alt="Double Cheeseburger">
      <h4>F Burger</h4>
      <p>69 Kč</p>
    </div>
    <div class="menu-item">
      <img src="www/img/OIP (7).jpg" alt="Double Cheeseburger">
      <h4>G Burger</h4>
      <p>89 Kč</p>
    </div>
    <div class="menu-item">
      <img src="www/img/OIP (8).jpg" alt="Double Cheeseburger">
      <h4>H Burger </h4>
      <p>80 Kč</p>
  </div>

  <div class="footer">
    <button class="cancel-button">Cancel Order</button>
    <button class="add-button">Add to Order</button>
  </div>
</div>

</body>
</html>
